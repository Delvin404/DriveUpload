<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squish & Send!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink: #ff6eb4;
  --yellow: #ffd93d;
  --blue: #6bcbff;
  --purple: #c084fc;
  --green: #6ee7b7;
  --orange: #ffb347;
  --dark: #1a1a2e;
  --white: #fffbfe;
}

body {
  background: #fff0f8;
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem 3rem;
  overflow-x: hidden;
}

/* ══════════════════════════════
   ANIMATED BACKGROUND
══════════════════════════════ */

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* Polka dots */
.bg-layer::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, #ffb3d9 2px, transparent 2px);
  background-size: 32px 32px;
  opacity: 0.4;
  animation: bgDrift 20s linear infinite;
}

@keyframes bgDrift {
  0% { background-position: 0 0; }
  100% { background-position: 64px 64px; }
}

/* Floating blobs */
.blob {
  position: fixed;
  border-radius: 50%;
  z-index: 0;
  pointer-events: none;
  animation: blobFloat linear infinite;
}
.blob1 { width:180px; height:180px; background:#ffd6ec; top:5%; left:3%; animation-duration:14s; animation-delay:0s; }
.blob2 { width:120px; height:120px; background:#d6f0ff; top:20%; right:5%; animation-duration:11s; animation-delay:-4s; }
.blob3 { width:150px; height:150px; background:#ffe8a0; bottom:15%; left:8%; animation-duration:16s; animation-delay:-8s; }
.blob4 { width:100px; height:100px; background:#e9d5ff; bottom:10%; right:10%; animation-duration:12s; animation-delay:-2s; }
.blob5 { width:80px; height:80px; background:#d1fae5; top:50%; left:1%; animation-duration:10s; animation-delay:-6s; }

@keyframes blobFloat {
  0%   { transform: translateY(0px) scale(1) rotate(0deg); }
  25%  { transform: translateY(-30px) scale(1.05) rotate(3deg); }
  50%  { transform: translateY(-15px) scale(0.97) rotate(-2deg); }
  75%  { transform: translateY(-40px) scale(1.03) rotate(2deg); }
  100% { transform: translateY(0px) scale(1) rotate(0deg); }
}

/* Floating sparkle stars */
.sparkle {
  position: fixed;
  z-index: 0;
  pointer-events: none;
  animation: sparkleFly linear infinite;
  opacity: 0;
}

@keyframes sparkleFly {
  0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

/* ══════════════════════════════
   PAGE ENTRY ANIMATIONS
══════════════════════════════ */
.wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  animation: wrapperEntry 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes wrapperEntry {
  0%   { opacity: 0; transform: translateY(60px) scale(0.9); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.header {
  text-align: center;
  margin-bottom: 1.5rem;
  animation: headerDrop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}

@keyframes headerDrop {
  0%   { opacity: 0; transform: translateY(-40px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════
   LOGO BADGE
══════════════════════════════ */
.logo-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--yellow);
  border: 3px solid #222;
  border-radius: 99px;
  padding: 7px 18px 7px 10px;
  box-shadow: 4px 4px 0 #222;
  margin-bottom: 1rem;
  animation: wiggle 3s ease-in-out infinite 1s;
}

@keyframes wiggle {
  0%,100% { transform: rotate(0deg); }
  20%      { transform: rotate(-3deg); }
  40%      { transform: rotate(3deg); }
  60%      { transform: rotate(-2deg); }
  80%      { transform: rotate(2deg); }
}

.logo-circle {
  width: 30px; height: 30px;
  background: var(--pink);
  border: 2.5px solid #222;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.logo-text {
  font-family: 'Fredoka One', sans-serif;
  font-size: 1rem;
  color: #222;
}

h1 {
  font-family: 'Fredoka One', sans-serif;
  font-size: 2.5rem;
  color: #222;
  line-height: 1.1;
  margin-bottom: 0.4rem;
  animation: titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes titlePop {
  0%   { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}

h1 .c1 { color: var(--pink); }
h1 .c2 { color: var(--blue); display: inline-block; animation: bounce 2s ease-in-out infinite 0.5s; }
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

.subtitle { font-size: 0.92rem; color: #999; font-weight: 700; }

/* bouncing dots row */
.dot-row { display: flex; justify-content: center; gap: 8px; margin: 0.8rem 0 1.2rem; }
.bdot {
  width: 12px; height: 12px; border-radius: 50%; border: 2px solid #222;
  animation: dotBounce 1.4s ease-in-out infinite;
}
.bdot:nth-child(1) { background: var(--pink);   animation-delay: 0s; }
.bdot:nth-child(2) { background: var(--yellow);  animation-delay: 0.15s; }
.bdot:nth-child(3) { background: var(--blue);    animation-delay: 0.3s; }
.bdot:nth-child(4) { background: var(--purple);  animation-delay: 0.45s; }
.bdot:nth-child(5) { background: var(--green);   animation-delay: 0.6s; }
@keyframes dotBounce {
  0%,80%,100% { transform: translateY(0); }
  40%         { transform: translateY(-10px); }
}

/* ══════════════════════════════
   CARD
══════════════════════════════ */
.card {
  background: #fff;
  border: 3px solid #222;
  border-radius: 28px;
  padding: 1.75rem;
  box-shadow: 7px 7px 0 #222;
  animation: cardEntry 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes cardEntry {
  0%   { opacity: 0; transform: translateY(30px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* ══════════════════════════════
   DROP ZONE
══════════════════════════════ */
.drop-zone {
  border: 3px dashed #ffb3d9;
  border-radius: 20px;
  padding: 2.2rem 1.5rem 1.8rem;
  text-align: center;
  cursor: pointer;
  background: #fff9fc;
  transition: all 0.2s;
  position: relative;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--pink);
  background: #fff0f8;
  transform: scale(1.01) rotate(-0.5deg);
}
.drop-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

/* Hand-drawn cloud using CSS only */
.cloud-wrap {
  position: relative;
  width: 80px; height: 60px;
  margin: 0 auto 1rem;
  animation: cloudBob 3s ease-in-out infinite;
}
@keyframes cloudBob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
.cloud-base {
  position: absolute;
  bottom: 0; left: 0;
  width: 80px; height: 34px;
  background: var(--purple);
  border: 3px solid #222;
  border-radius: 99px;
  box-shadow: 3px 3px 0 #222;
}
.cloud-puff1 {
  position: absolute;
  width: 36px; height: 36px;
  background: var(--purple);
  border: 3px solid #222;
  border-radius: 50%;
  bottom: 18px; left: 8px;
}
.cloud-puff2 {
  position: absolute;
  width: 28px; height: 28px;
  background: var(--purple);
  border: 3px solid #222;
  border-radius: 50%;
  bottom: 24px; left: 34px;
}
.cloud-arrow {
  position: absolute;
  bottom: 6px; left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  color: #fff;
  font-size: 18px;
  font-weight: 900;
  line-height: 1;
  animation: arrowPulse 1.2s ease-in-out infinite;
}
@keyframes arrowPulse {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-4px); }
}

.drop-title {
  font-family: 'Fredoka One', sans-serif;
  font-size: 1.15rem; color: #222; margin-bottom: 0.3rem;
}
.drop-sub { font-size: 0.82rem; color: #bbb; font-weight: 700; }
.drop-sub strong { color: var(--pink); }

.type-pills {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 6px; margin-top: 0.85rem;
}
.tpill {
  font-size: 0.7rem; font-weight: 800;
  padding: 4px 10px; border-radius: 99px;
  border: 2.5px solid #222;
  box-shadow: 2px 2px 0 #222;
  text-transform: uppercase; letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 4px;
}
.tp-a { background: #ffecf5; color: #c0006a; }
.tp-b { background: #e8f5ff; color: #005fa3; }
.tp-c { background: #e8fdf5; color: #006645; }
.tp-d { background: #fffbdd; color: #8a6000; }

/* ══════════════════════════════
   STATS ROW
══════════════════════════════ */
.stats-row { display: none; gap: 8px; margin-top: 1rem; }
.stat-box {
  flex: 1; border: 2.5px solid #222; border-radius: 14px;
  padding: 0.6rem 0.8rem; box-shadow: 3px 3px 0 #222;
  display: flex; align-items: center; gap: 8px;
}
.sb-pink { background: #fff0f8; }
.sb-blue { background: #f0f8ff; }
.stat-ico { font-size: 22px; }
.sb-pink .stat-ico { color: var(--pink); }
.sb-blue .stat-ico { color: var(--blue); }
.stat-lbl { font-size: 0.65rem; color: #aaa; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-num { font-family: 'Fredoka One', sans-serif; font-size: 1.15rem; color: #222; }

/* ══════════════════════════════
   FILE LIST
══════════════════════════════ */
.file-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 6px; }

.file-item {
  display: flex; align-items: center; gap: 9px;
  padding: 0.55rem 0.75rem;
  border: 2.5px solid #222; border-radius: 12px; background: #fff;
  box-shadow: 2px 2px 0 #222;
  animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn {
  0%   { opacity: 0; transform: scale(0.75) rotate(-3deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

.ficon {
  width: 28px; height: 28px; border-radius: 8px; border: 2px solid #222;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 14px;
}
.fi-img { background: #fffadd; } .fi-img span { color: #d4900a; }
.fi-vid { background: #ffecf5; } .fi-vid span { color: #c0006a; }
.fi-doc { background: #e8f5ff; } .fi-doc span { color: #005fa3; }
.fi-zip { background: #e8fdf5; } .fi-zip span { color: #006645; }
.fi-def { background: #f0edff; } .fi-def span { color: #6d28d9; }

.fname { flex: 1; font-size: 0.78rem; font-weight: 800; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fsize { font-size: 0.7rem; font-weight: 800; color: #bbb; flex-shrink: 0; }

.remove-btn {
  background: var(--pink); border: 2px solid #222;
  color: #fff; width: 22px; height: 22px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer; font-size: 13px; font-weight: 900;
  box-shadow: 1px 1px 0 #222; transition: transform 0.12s;
  line-height: 1;
}
.remove-btn:hover { transform: scale(1.2) rotate(10deg); }

/* ══════════════════════════════
   PROGRESS
══════════════════════════════ */
.progress-wrap {
  margin-top: 0.85rem; height: 12px;
  background: #ffe8f4; border: 2.5px solid #222; border-radius: 99px;
  overflow: hidden; display: none; box-shadow: 2px 2px 0 #222;
}
.progress-fill {
  height: 100%;
  background: repeating-linear-gradient(90deg,
    var(--pink) 0,var(--pink) 20px,
    var(--yellow) 20px,var(--yellow) 40px,
    var(--blue) 40px,var(--blue) 60px,
    var(--purple) 60px,var(--purple) 80px
  );
  background-size: 80px 100%;
  animation: stripeMove 0.5s linear infinite;
  border-radius: 99px; transition: width 0.35s ease; width: 0%;
}
@keyframes stripeMove { to { background-position: 80px 0; } }

/* ══════════════════════════════
   UPLOAD BUTTON
══════════════════════════════ */
.upload-btn {
  margin-top: 1.1rem; width: 100%; padding: 0.95rem;
  background: var(--pink); color: #fff;
  border: 3px solid #222; border-radius: 18px;
  font-family: 'Fredoka One', sans-serif; font-size: 1.25rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 5px 5px 0 #222;
  transition: transform 0.12s, box-shadow 0.12s;
  letter-spacing: 0.03em;
}
.upload-btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 #222; }
.upload-btn:active:not(:disabled) { transform: translate(3px,3px); box-shadow: 2px 2px 0 #222; }
.upload-btn:disabled { background: #e0e0e0; color: #aaa; box-shadow: 3px 3px 0 #ccc; border-color: #ccc; cursor: not-allowed; }

.spinner {
  width: 20px; height: 20px;
  border: 3px solid rgba(255,255,255,0.4); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════
   STATUS MESSAGES
══════════════════════════════ */
.status-msg {
  margin-top: 1rem; padding: 1rem 1.1rem; border-radius: 14px;
  font-size: 0.9rem; font-weight: 800; display: none;
  align-items: flex-start; gap: 10px;
  border: 2.5px solid #222; box-shadow: 4px 4px 0 #222;
  animation: statusPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes statusPop {
  0%   { opacity: 0; transform: scale(0.85) rotate(-2deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
.status-msg.success { background: #e8fdf5; color: #006645; display: flex; }
.status-msg.error   { background: #fff0f0; color: #b00020; display: flex; }
.status-icon { font-size: 24px; flex-shrink: 0; margin-top: 1px; }
.status-msg.success .status-icon { color: #00a86b; }
.status-msg.error   .status-icon { color: #e00030; }
.status-body { display: flex; flex-direction: column; gap: 3px; }
.status-main { font-family: 'Fredoka One', sans-serif; font-size: 1rem; }
.status-sub  { font-size: 0.82rem; font-weight: 700; opacity: 0.8; line-height: 1.5; }

/* ══════════════════════════════
   CONFETTI (js-driven)
══════════════════════════════ */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 999;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* ══════════════════════════════
   FOOTER
══════════════════════════════ */
.footer {
  text-align: center; margin-top: 1.5rem;
  font-size: 0.78rem; color: #ccc; font-weight: 800;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  animation: fadeUp 0.6s ease 0.8s both;
}
@keyframes fadeUp {
  0%   { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="blob blob4"></div>
<div class="blob blob5"></div>

<div class="wrapper">
  <div class="header">
    <div class="logo-badge">
      <div class="logo-circle">&#9729;</div>
      <span class="logo-text">Squish &amp; Send</span>
    </div>
    <h1>Drop your files<br><span class="c1">right</span> <span class="c2">here!</span></h1>
    <p class="subtitle">We'll whisk them away safely &#x2728;</p>
    <div class="dot-row">
      <div class="bdot"></div><div class="bdot"></div><div class="bdot"></div>
      <div class="bdot"></div><div class="bdot"></div>
    </div>
  </div>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple />
      <div class="cloud-wrap">
        <div class="cloud-puff1"></div>
        <div class="cloud-puff2"></div>
        <div class="cloud-base"></div>
        <div class="cloud-arrow">&#8679;</div>
      </div>
      <p class="drop-title">Click or drag files here</p>
      <p class="drop-sub">any type &middot; up to <strong>50 MB</strong></p>
      <div class="type-pills">
        <span class="tpill tp-a">&#128247; photos</span>
        <span class="tpill tp-b">&#128196; docs</span>
        <span class="tpill tp-c">&#127909; videos</span>
        <span class="tpill tp-d">&#128230; zips</span>
      </div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-box sb-pink">
        <span class="stat-ico">&#128196;</span>
        <div><div class="stat-lbl">Files</div><div class="stat-num" id="statFiles">0</div></div>
      </div>
      <div class="stat-box sb-blue">
        <span class="stat-ico">&#128190;</span>
        <div><div class="stat-lbl">Total size</div><div class="stat-num" id="statSize">0 KB</div></div>
      </div>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="upload-btn" id="uploadBtn" disabled onclick="uploadFiles()">
      <span id="btnIcon">&#128640;</span>
      <span id="btnText">Send it!</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="status-msg" id="statusMsg">
      <span class="status-icon" id="statusIcon"></span>
      <div class="status-body">
        <div class="status-main" id="statusMain"></div>
        <div class="status-sub"  id="statusSub"></div>
      </div>
    </div>
  </div>

  <p class="footer">&#128274; Files go straight to private secure storage</p>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKAUU_sNooxj3SrOm5-oQ3NKU_e22Ec3MVBIpu3nz6GFIxoYWE-euxumr4E8VZNr_U/exec";

  let selectedFiles = [];
  const dropZone    = document.getElementById("dropZone");
  const fileInput   = document.getElementById("fileInput");
  const fileList    = document.getElementById("fileList");
  const uploadBtn   = document.getElementById("uploadBtn");
  const progressWrap= document.getElementById("progressWrap");
  const progressFill= document.getElementById("progressFill");
  const statusMsg   = document.getElementById("statusMsg");
  const spinner     = document.getElementById("spinner");
  const btnText     = document.getElementById("btnText");
  const btnIcon     = document.getElementById("btnIcon");
  const statsRow    = document.getElementById("statsRow");

  /* Spawn floating sparkles */
  const sparkleChars = ["✦","✧","★","✿","♥","✪","◆"];
  const sparkleColors = ["#ff6eb4","#ffd93d","#6bcbff","#c084fc","#6ee7b7","#ffb347"];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = sparkleChars[i % sparkleChars.length];
    s.style.cssText = `
      left:${Math.random()*100}%;
      font-size:${10+Math.random()*14}px;
      color:${sparkleColors[i%sparkleColors.length]};
      animation-duration:${8+Math.random()*10}s;
      animation-delay:${-Math.random()*12}s;
    `;
    document.body.appendChild(s);
  }

  /* Confetti burst */
  function launchConfetti() {
    const colors = ["#ff6eb4","#ffd93d","#6bcbff","#c084fc","#6ee7b7","#ffb347","#ff6b6b"];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.cssText = `
        left:${20+Math.random()*60}%;
        top:30%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${6+Math.random()*8}px;
        height:${6+Math.random()*8}px;
        border-radius:${Math.random()>0.5?"50%":"2px"};
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*0.4}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3500);
    }
  }

  fileInput.addEventListener("change", e => addFiles(e.target.files));
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("dragover"); addFiles(e.dataTransfer.files); });

  function addFiles(files) {
    [...files].forEach(f => {
      if (!selectedFiles.find(x => x.name===f.name && x.size===f.size)) selectedFiles.push(f);
    });
    renderList();
  }

  function removeFile(idx) { selectedFiles.splice(idx,1); renderList(); }

  function formatSize(b) {
    if (b<1024) return b+" B";
    if (b<1048576) return (b/1024).toFixed(1)+" KB";
    return (b/1048576).toFixed(1)+" MB";
  }

  function getIcon(f) {
    const t = f.type||"";
    if (t.startsWith("image/")) return ["fi-img","&#128247;"];
    if (t.startsWith("video/")) return ["fi-vid","&#127909;"];
    if (t.includes("pdf")||t.includes("word")||t.includes("text")) return ["fi-doc","&#128196;"];
    if (t.includes("zip")||t.includes("compressed")||t.includes("tar")) return ["fi-zip","&#128230;"];
    return ["fi-def","&#128193;"];
  }

  function renderList() {
    fileList.innerHTML = "";
    const total = selectedFiles.reduce((a,f)=>a+f.size,0);
    statsRow.style.display = selectedFiles.length ? "flex" : "none";
    document.getElementById("statFiles").textContent = selectedFiles.length;
    document.getElementById("statSize").textContent  = formatSize(total);

    selectedFiles.forEach((f,i) => {
      const [cls,ico] = getIcon(f);
      const d = document.createElement("div");
      d.className = "file-item";
      d.style.animationDelay = (i*0.05)+"s";
      d.innerHTML = `<div class="ficon ${cls}"><span>${ico}</span></div>
        <span class="fname">${f.name}</span>
        <span class="fsize">${formatSize(f.size)}</span>
        <button class="remove-btn" onclick="removeFile(${i})" title="Remove">&#x2715;</button>`;
      fileList.appendChild(d);
    });

    uploadBtn.disabled = !selectedFiles.length;
    statusMsg.className = "status-msg";
  }

  async function uploadFiles() {
    if (!selectedFiles.length) return;
    uploadBtn.disabled = true;
    spinner.style.display = "block";
    btnIcon.style.display = "none";
    btnText.textContent = "Sending...";
    progressWrap.style.display = "block";
    statusMsg.className = "status-msg";

    let uploaded=0, failed=0;
    for (let i=0; i<selectedFiles.length; i++) {
      const file = selectedFiles[i];
      progressFill.style.width = Math.round((i/selectedFiles.length)*100)+"%";
      try {
        const b64 = await toBase64(file);
        await fetch(SCRIPT_URL, {
          method:"POST", mode:"no-cors",
          body: JSON.stringify({name:file.name, mimeType:file.type||"application/octet-stream", data:b64})
        });
        uploaded++;
      } catch { failed++; }
    }

    progressFill.style.width = "100%";
    spinner.style.display = "none";
    btnIcon.style.display = "";
    btnText.textContent = "Send it!";

    if (failed===0) {
      launchConfetti();
      showStatus("success","&#9989;",
        `${uploaded} file${uploaded!==1?"s":""} sent — woohoo! &#127881;`,
        "Thank you for your Thesis Ahmad. Aap ko pastry treat du ga kisi din hehehe &#127859;"
      );
      selectedFiles=[]; renderList(); fileInput.value="";
    } else {
      showStatus("error","&#10060;",
        `${uploaded} sent, ${failed} failed.`,
        "Kuch masla ho gaya! Please try again &#128533;"
      );
    }

    setTimeout(()=>{ progressWrap.style.display="none"; progressFill.style.width="0%"; },1500);
    uploadBtn.disabled = !selectedFiles.length;
  }

  function toBase64(file) {
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(",")[1]);
      r.onerror=rej;
      r.readAsDataURL(file);
    });
  }

  function showStatus(type, icon, main, sub) {
    document.getElementById("statusIcon").innerHTML = icon;
    document.getElementById("statusMain").innerHTML = main;
    document.getElementById("statusSub").innerHTML  = sub||"";
    statusMsg.className = "status-msg "+type;
  }
</script>
</body>
</html>
