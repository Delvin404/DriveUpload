<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squish & Send!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink: #ff6eb4;
  --yellow: #ffd93d;
  --blue: #6bcbff;
  --purple: #c084fc;
  --green: #6ee7b7;
  --orange: #ffb347;
  --dark: #1a1a2e;
  --white: #fffbfe;
}

body {
  background: #fff0f8;
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem 3rem;
  overflow-x: hidden;
}

/* ══════════════════════════════
   CURTAIN REVEAL
══════════════════════════════ */
.curtain-left, .curtain-right {
  position: fixed;
  top: 0;
  width: 51%;
  height: 100%;
  background: #1a1a2e;
  z-index: 9999;
  pointer-events: none;
}
.curtain-left {
  left: 0;
  transform-origin: left;
  animation: curtainLeft 1.1s cubic-bezier(0.77,0,0.18,1) 0.3s both;
}
.curtain-right {
  right: 0;
  transform-origin: right;
  animation: curtainRight 1.1s cubic-bezier(0.77,0,0.18,1) 0.3s both;
}
@keyframes curtainLeft {
  0%   { transform: scaleX(1); }
  100% { transform: scaleX(0); }
}
@keyframes curtainRight {
  0%   { transform: scaleX(1); }
  100% { transform: scaleX(0); }
}

.curtain-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  z-index: 10000;
  font-family: 'Fredoka One', sans-serif;
  font-size: 2.5rem;
  color: #ffd93d;
  text-align: center;
  pointer-events: none;
  animation: curtainLogoFade 0.5s ease 1.1s both;
  white-space: nowrap;
}
.curtain-logo span { display: block; font-size: 3rem; animation: curtainLogoSpin 1s ease 0s both; }
@keyframes curtainLogoSpin {
  0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes curtainLogoFade {
  0%   { opacity: 1; }
  100% { opacity: 0; pointer-events: none; }
}

/* ══════════════════════════════
   ANIMATED BACKGROUND
══════════════════════════════ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.bg-layer::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, #ffb3d9 2px, transparent 2px);
  background-size: 32px 32px;
  opacity: 0.4;
  animation: bgDrift 20s linear infinite;
}
@keyframes bgDrift {
  0%   { background-position: 0 0; }
  100% { background-position: 64px 64px; }
}

.blob {
  position: fixed;
  border-radius: 50%;
  z-index: 0;
  pointer-events: none;
  animation: blobFloat linear infinite;
}
.blob1 { width:180px; height:180px; background:#ffd6ec; top:5%; left:3%; animation-duration:14s; }
.blob2 { width:120px; height:120px; background:#d6f0ff; top:20%; right:5%; animation-duration:11s; animation-delay:-4s; }
.blob3 { width:150px; height:150px; background:#ffe8a0; bottom:15%; left:8%; animation-duration:16s; animation-delay:-8s; }
.blob4 { width:100px; height:100px; background:#e9d5ff; bottom:10%; right:10%; animation-duration:12s; animation-delay:-2s; }
.blob5 { width:80px; height:80px; background:#d1fae5; top:50%; left:1%; animation-duration:10s; animation-delay:-6s; }
@keyframes blobFloat {
  0%   { transform: translateY(0px) scale(1) rotate(0deg); }
  25%  { transform: translateY(-30px) scale(1.05) rotate(3deg); }
  50%  { transform: translateY(-15px) scale(0.97) rotate(-2deg); }
  75%  { transform: translateY(-40px) scale(1.03) rotate(2deg); }
  100% { transform: translateY(0px) scale(1) rotate(0deg); }
}

.sparkle {
  position: fixed;
  z-index: 0;
  pointer-events: none;
  animation: sparkleFly linear infinite;
  opacity: 0;
}
@keyframes sparkleFly {
  0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

/* ══════════════════════════════
   WRAPPER & ENTRY
══════════════════════════════ */
.wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  animation: wrapperEntry 0.9s cubic-bezier(0.34,1.56,0.64,1) 1.2s both;
}
@keyframes wrapperEntry {
  0%   { opacity: 0; transform: translateY(60px) scale(0.85); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.header {
  text-align: center;
  margin-bottom: 1.5rem;
  animation: headerDrop 0.7s cubic-bezier(0.34,1.56,0.64,1) 1.5s both;
}
@keyframes headerDrop {
  0%   { opacity: 0; transform: translateY(-40px); }
  100% { opacity: 1; transform: translateY(0); }
}

.logo-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--yellow);
  border: 3px solid #222;
  border-radius: 99px;
  padding: 7px 18px 7px 10px;
  box-shadow: 4px 4px 0 #222;
  margin-bottom: 1rem;
  animation: wiggle 3s ease-in-out infinite 2.5s;
}
@keyframes wiggle {
  0%,100% { transform: rotate(0deg); }
  20%      { transform: rotate(-3deg); }
  40%      { transform: rotate(3deg); }
  60%      { transform: rotate(-2deg); }
  80%      { transform: rotate(2deg); }
}
.logo-circle {
  width: 30px; height: 30px;
  background: var(--pink);
  border: 2.5px solid #222;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  animation: logoSpin 6s ease-in-out infinite 3s;
}
@keyframes logoSpin {
  0%,80%,100% { transform: rotate(0deg); }
  90%         { transform: rotate(360deg); }
}
.logo-text { font-family: 'Fredoka One', sans-serif; font-size: 1rem; color: #222; }

h1 {
  font-family: 'Fredoka One', sans-serif;
  font-size: 2.5rem;
  color: #222;
  line-height: 1.1;
  margin-bottom: 0.4rem;
  animation: titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.6s both;
}
@keyframes titlePop {
  0%   { opacity: 0; transform: scale(0.8) rotate(-3deg); }
  70%  { transform: scale(1.05) rotate(1deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
h1 .c1 { color: var(--pink); display: inline-block; animation: colorShift 4s ease-in-out infinite 2s; }
@keyframes colorShift {
  0%,100% { color: var(--pink); }
  33%     { color: var(--purple); }
  66%     { color: var(--orange); }
}
h1 .c2 { color: var(--blue); display: inline-block; animation: bounce 2s ease-in-out infinite 2s; }
@keyframes bounce {
  0%,100% { transform: translateY(0) rotate(0deg); }
  40%     { transform: translateY(-8px) rotate(-5deg); }
  60%     { transform: translateY(-4px) rotate(3deg); }
}
.subtitle { font-size: 0.92rem; color: #999; font-weight: 700; animation: subtitleSlide 0.5s ease 1.8s both; }
@keyframes subtitleSlide {
  0%   { opacity: 0; transform: translateX(-20px); }
  100% { opacity: 1; transform: translateX(0); }
}

/* bouncing dots */
.dot-row { display: flex; justify-content: center; gap: 8px; margin: 0.8rem 0 1.2rem; }
.bdot {
  width: 12px; height: 12px; border-radius: 50%; border: 2px solid #222;
  animation: dotBounce 1.4s ease-in-out infinite;
}
.bdot:nth-child(1) { background: var(--pink);   animation-delay: 0s; }
.bdot:nth-child(2) { background: var(--yellow);  animation-delay: 0.15s; }
.bdot:nth-child(3) { background: var(--blue);    animation-delay: 0.3s; }
.bdot:nth-child(4) { background: var(--purple);  animation-delay: 0.45s; }
.bdot:nth-child(5) { background: var(--green);   animation-delay: 0.6s; }
@keyframes dotBounce {
  0%,80%,100% { transform: translateY(0) scale(1); }
  40%         { transform: translateY(-12px) scale(1.2); }
}

/* ══════════════════════════════
   CARD
══════════════════════════════ */
.card {
  background: #fff;
  border: 3px solid #222;
  border-radius: 28px;
  padding: 1.75rem;
  box-shadow: 7px 7px 0 #222;
  animation: cardEntry 0.7s cubic-bezier(0.34,1.56,0.64,1) 1.4s both;
  transition: box-shadow 0.2s, transform 0.2s;
}
.card:hover { box-shadow: 9px 9px 0 #222; transform: translate(-1px,-1px); }
@keyframes cardEntry {
  0%   { opacity: 0; transform: translateY(40px) scale(0.93) rotate(1deg); }
  100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
}

/* ══════════════════════════════
   DROP ZONE
══════════════════════════════ */
.drop-zone {
  border: 3px dashed #ffb3d9;
  border-radius: 20px;
  padding: 2.2rem 1.5rem 1.8rem;
  text-align: center;
  cursor: pointer;
  background: #fff9fc;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
}
.drop-zone::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(255,110,180,0.08) 0%, transparent 70%);
  pointer-events: none;
  animation: dropGlow 3s ease-in-out infinite;
}
@keyframes dropGlow {
  0%,100% { opacity: 0.5; transform: scale(0.95); }
  50%     { opacity: 1; transform: scale(1.05); }
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--pink);
  background: #fff0f8;
  transform: scale(1.02) rotate(-0.5deg);
  box-shadow: 0 0 0 4px rgba(255,110,180,0.15);
}
.drop-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

/* Cloud */
.cloud-wrap {
  position: relative;
  width: 80px; height: 60px;
  margin: 0 auto 1rem;
  animation: cloudBob 3s ease-in-out infinite;
}
@keyframes cloudBob {
  0%,100% { transform: translateY(0) rotate(0deg); }
  30%     { transform: translateY(-10px) rotate(-2deg); }
  70%     { transform: translateY(-6px) rotate(2deg); }
}
.cloud-base { position: absolute; bottom: 0; left: 0; width: 80px; height: 34px; background: var(--purple); border: 3px solid #222; border-radius: 99px; box-shadow: 3px 3px 0 #222; }
.cloud-puff1 { position: absolute; width: 36px; height: 36px; background: var(--purple); border: 3px solid #222; border-radius: 50%; bottom: 18px; left: 8px; }
.cloud-puff2 { position: absolute; width: 28px; height: 28px; background: var(--purple); border: 3px solid #222; border-radius: 50%; bottom: 24px; left: 34px; }
.cloud-arrow {
  position: absolute; bottom: 6px; left: 50%;
  transform: translateX(-50%);
  z-index: 2; color: #fff; font-size: 18px; font-weight: 900; line-height: 1;
  animation: arrowPulse 0.9s ease-in-out infinite;
}
@keyframes arrowPulse {
  0%,100% { transform: translateX(-50%) translateY(0) scale(1); }
  50%     { transform: translateX(-50%) translateY(-5px) scale(1.15); }
}
.drop-title { font-family: 'Fredoka One', sans-serif; font-size: 1.15rem; color: #222; margin-bottom: 0.3rem; }
.drop-sub { font-size: 0.82rem; color: #bbb; font-weight: 700; }
.drop-sub strong { color: var(--pink); }

.type-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 0.85rem; }
.tpill {
  font-size: 0.7rem; font-weight: 800;
  padding: 4px 10px; border-radius: 99px;
  border: 2.5px solid #222; box-shadow: 2px 2px 0 #222;
  text-transform: uppercase; letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 4px;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  animation: pillEnter 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.tpill:nth-child(1) { animation-delay: 1.9s; }
.tpill:nth-child(2) { animation-delay: 2.0s; }
.tpill:nth-child(3) { animation-delay: 2.1s; }
.tpill:nth-child(4) { animation-delay: 2.2s; }
@keyframes pillEnter {
  0%   { opacity: 0; transform: scale(0) rotate(-20deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
.tpill:hover { transform: scale(1.12) rotate(-3deg); }
.tp-a { background: #ffecf5; color: #c0006a; }
.tp-b { background: #e8f5ff; color: #005fa3; }
.tp-c { background: #e8fdf5; color: #006645; }
.tp-d { background: #fffbdd; color: #8a6000; }

/* ══════════════════════════════
   STATS ROW
══════════════════════════════ */
.stats-row { display: none; gap: 8px; margin-top: 1rem; }
.stat-box {
  flex: 1; border: 2.5px solid #222; border-radius: 14px;
  padding: 0.6rem 0.8rem; box-shadow: 3px 3px 0 #222;
  display: flex; align-items: center; gap: 8px;
  transition: transform 0.15s;
}
.stat-box:hover { transform: translate(-1px,-1px); }
.sb-pink { background: #fff0f8; }
.sb-blue { background: #f0f8ff; }
.stat-ico { font-size: 22px; animation: statIcoWiggle 2s ease-in-out infinite; }
@keyframes statIcoWiggle {
  0%,100% { transform: rotate(0deg); }
  25%     { transform: rotate(-8deg) scale(1.1); }
  75%     { transform: rotate(8deg) scale(1.1); }
}
.sb-pink .stat-ico { color: var(--pink); }
.sb-blue .stat-ico { color: var(--blue); }
.stat-lbl { font-size: 0.65rem; color: #aaa; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-num { font-family: 'Fredoka One', sans-serif; font-size: 1.15rem; color: #222; }

/* ══════════════════════════════
   FILE LIST
══════════════════════════════ */
.file-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 6px; }
.file-item {
  display: flex; align-items: center; gap: 9px;
  padding: 0.55rem 0.75rem;
  border: 2.5px solid #222; border-radius: 12px; background: #fff;
  box-shadow: 2px 2px 0 #222;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  transition: transform 0.15s, box-shadow 0.15s;
}
.file-item:hover { transform: translate(-1px,-1px) rotate(-0.5deg); box-shadow: 3px 3px 0 #222; }
@keyframes popIn {
  0%   { opacity: 0; transform: scale(0.6) rotate(-8deg); }
  70%  { transform: scale(1.05) rotate(2deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
.ficon { width: 28px; height: 28px; border-radius: 8px; border: 2px solid #222; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
.fi-img { background: #fffadd; } .fi-img span { color: #d4900a; }
.fi-vid { background: #ffecf5; } .fi-vid span { color: #c0006a; }
.fi-doc { background: #e8f5ff; } .fi-doc span { color: #005fa3; }
.fi-zip { background: #e8fdf5; } .fi-zip span { color: #006645; }
.fi-def { background: #f0edff; } .fi-def span { color: #6d28d9; }
.fname { flex: 1; font-size: 0.78rem; font-weight: 800; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fsize { font-size: 0.7rem; font-weight: 800; color: #bbb; flex-shrink: 0; }
.remove-btn {
  background: var(--pink); border: 2px solid #222;
  color: #fff; width: 22px; height: 22px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer; font-size: 13px; font-weight: 900;
  box-shadow: 1px 1px 0 #222; transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), background 0.1s;
  line-height: 1;
}
.remove-btn:hover { transform: scale(1.3) rotate(90deg); background: #ff3d88; }

/* ══════════════════════════════
   PROGRESS
══════════════════════════════ */
.progress-wrap {
  margin-top: 0.85rem; height: 12px;
  background: #ffe8f4; border: 2.5px solid #222; border-radius: 99px;
  overflow: hidden; display: none; box-shadow: 2px 2px 0 #222;
}
.progress-fill {
  height: 100%;
  background: repeating-linear-gradient(90deg,
    var(--pink) 0,var(--pink) 20px,
    var(--yellow) 20px,var(--yellow) 40px,
    var(--blue) 40px,var(--blue) 60px,
    var(--purple) 60px,var(--purple) 80px
  );
  background-size: 80px 100%;
  animation: stripeMove 0.5s linear infinite;
  border-radius: 99px; transition: width 0.35s ease; width: 0%;
}
@keyframes stripeMove { to { background-position: 80px 0; } }

/* ══════════════════════════════
   UPLOAD BUTTON
══════════════════════════════ */
.upload-btn {
  margin-top: 1.1rem; width: 100%; padding: 0.95rem;
  background: var(--pink); color: #fff;
  border: 3px solid #222; border-radius: 18px;
  font-family: 'Fredoka One', sans-serif; font-size: 1.25rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 5px 5px 0 #222;
  transition: transform 0.12s, box-shadow 0.12s, background 0.2s;
  letter-spacing: 0.03em;
  position: relative;
  overflow: hidden;
}
.upload-btn::before {
  content: '';
  position: absolute;
  top: -50%; left: -60%;
  width: 40%; height: 200%;
  background: rgba(255,255,255,0.25);
  transform: skewX(-20deg);
  animation: btnShine 3s ease-in-out infinite 3.5s;
}
@keyframes btnShine {
  0%  { left: -60%; opacity: 0; }
  10% { opacity: 1; }
  40% { left: 120%; opacity: 0; }
  100% { left: 120%; opacity: 0; }
}
.upload-btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 #222; background: #ff3d88; }
.upload-btn:active:not(:disabled) { transform: translate(3px,3px); box-shadow: 2px 2px 0 #222; }
.upload-btn:disabled { background: #e0e0e0; color: #aaa; box-shadow: 3px 3px 0 #ccc; border-color: #ccc; cursor: not-allowed; }
.spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════
   STANDARD STATUS MSG
══════════════════════════════ */
.status-msg {
  margin-top: 1rem; padding: 1rem 1.1rem; border-radius: 14px;
  font-size: 0.9rem; font-weight: 800; display: none;
  align-items: flex-start; gap: 10px;
  border: 2.5px solid #222; box-shadow: 4px 4px 0 #222;
  animation: statusPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes statusPop {
  0%   { opacity: 0; transform: scale(0.85) rotate(-2deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
.status-msg.error { background: #fff0f0; color: #b00020; display: flex; }
.status-icon { font-size: 24px; flex-shrink: 0; margin-top: 1px; }
.status-msg.error .status-icon { color: #e00030; }
.status-body { display: flex; flex-direction: column; gap: 3px; }
.status-main { font-family: 'Fredoka One', sans-serif; font-size: 1rem; }
.status-sub  { font-size: 0.82rem; font-weight: 700; opacity: 0.8; line-height: 1.5; }

/* ══════════════════════════════
   SPECIAL SUCCESS MODAL 🎉
══════════════════════════════ */
.success-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 230, 245, 0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 5000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: overlayIn 0.4s ease both;
  cursor: pointer;
}
@keyframes overlayIn {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}
.success-overlay.hiding {
  animation: overlayOut 0.4s ease both;
}
@keyframes overlayOut {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

.success-box {
  background: #fff;
  border: 4px solid #222;
  border-radius: 32px;
  box-shadow: 10px 10px 0 #222;
  padding: 2.5rem 2rem 2rem;
  max-width: 360px;
  width: 90%;
  text-align: center;
  position: relative;
  animation: successBoxPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
  overflow: hidden;
}
@keyframes successBoxPop {
  0%   { opacity: 0; transform: scale(0.4) rotate(-10deg); }
  60%  { transform: scale(1.08) rotate(2deg); }
  80%  { transform: scale(0.96) rotate(-1deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* Rainbow top stripe on success box */
.success-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 7px;
  background: linear-gradient(90deg,
    var(--pink), var(--yellow), var(--blue),
    var(--purple), var(--green), var(--orange), var(--pink)
  );
  background-size: 200% 100%;
  animation: rainbowSlide 2s linear infinite;
}
@keyframes rainbowSlide {
  0%   { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* Shiny shimmer inside box */
.success-box::after {
  content: '';
  position: absolute;
  top: -100%; left: -60%;
  width: 50%; height: 300%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  transform: skewX(-20deg);
  animation: boxShimmer 2.5s ease-in-out infinite 1s;
}
@keyframes boxShimmer {
  0%,100% { left: -60%; }
  50%     { left: 120%; }
}

.success-emoji-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 0.75rem;
}
.success-emoji {
  font-size: 4rem;
  display: block;
  animation: emojiDance 1s cubic-bezier(0.34,1.56,0.64,1) 0.5s both, emojiFloat 3s ease-in-out infinite 1.5s;
}
@keyframes emojiDance {
  0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
  60%  { transform: scale(1.3) rotate(15deg); }
  80%  { transform: scale(0.9) rotate(-5deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes emojiFloat {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%     { transform: translateY(-10px) rotate(5deg); }
}

/* Orbiting mini emojis */
.orbit-ring {
  position: absolute;
  top: 50%; left: 50%;
  width: 90px; height: 90px;
  margin: -45px 0 0 -45px;
  animation: orbitSpin 4s linear infinite 1s;
  pointer-events: none;
}
@keyframes orbitSpin { to { transform: rotate(360deg); } }
.orbit-dot {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  font-size: 1.1rem;
}
.orbit-dot:nth-child(2) { transform: translateX(-50%) rotate(120deg) translateY(-45px) rotate(-120deg); top: auto; bottom: 0; left: 50%; }
.orbit-dot:nth-child(3) { top: 50%; left: 100%; transform: translateY(-50%); }

.success-title {
  font-family: 'Fredoka One', sans-serif;
  font-size: 1.6rem;
  color: #222;
  margin-bottom: 0.4rem;
  animation: titleSlideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
}
@keyframes titleSlideUp {
  0%   { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}
.success-title .s1 { color: var(--pink); }
.success-title .s2 { color: var(--purple); }

.success-divider {
  width: 60px; height: 3px;
  background: var(--yellow);
  border: 1.5px solid #222;
  border-radius: 99px;
  margin: 0.6rem auto 0.8rem;
  animation: dividerGrow 0.4s ease 0.9s both;
}
@keyframes dividerGrow {
  0%   { width: 0; opacity: 0; }
  100% { width: 60px; opacity: 1; }
}

/* The animated text message */
.success-message {
  font-size: 1.05rem;
  font-weight: 800;
  color: #333;
  line-height: 1.5;
  min-height: 1.8rem;
  margin-bottom: 0.5rem;
  position: relative;
}
.typed-text { color: #222; }
.typed-cursor {
  display: inline-block;
  width: 2px; height: 1.1em;
  background: var(--pink);
  vertical-align: middle;
  margin-left: 1px;
  animation: blink 0.7s step-end infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%     { opacity: 0; }
}

.success-sub {
  font-size: 0.8rem;
  color: #bbb;
  font-weight: 700;
  margin-top: 0.25rem;
  animation: fadeIn 0.4s ease 2.5s both;
}
@keyframes fadeIn {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

.success-close-btn {
  margin-top: 1.2rem;
  padding: 0.7rem 1.8rem;
  background: var(--pink);
  color: #fff;
  border: 3px solid #222;
  border-radius: 14px;
  font-family: 'Fredoka One', sans-serif;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 4px 4px 0 #222;
  transition: transform 0.12s, box-shadow 0.12s;
  animation: btnAppear 0.4s cubic-bezier(0.34,1.56,0.64,1) 2.8s both;
}
@keyframes btnAppear {
  0%   { opacity: 0; transform: scale(0.7); }
  100% { opacity: 1; transform: scale(1); }
}
.success-close-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #222; }
.success-close-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #222; }

/* Heart pulse ring */
.heart-ring {
  position: absolute;
  border: 3px solid var(--pink);
  border-radius: 50%;
  opacity: 0;
  animation: heartPulseRing 2s ease-out infinite 1.5s;
  pointer-events: none;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
@keyframes heartPulseRing {
  0%   { width: 60px; height: 60px; opacity: 0.8; margin: -30px 0 0 -30px; }
  100% { width: 120px; height: 120px; opacity: 0; margin: -60px 0 0 -60px; }
}

/* ══════════════════════════════
   CONFETTI
══════════════════════════════ */
.confetti-piece {
  position: fixed;
  pointer-events: none;
  z-index: 6000;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
  50%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.5); }
}

/* ══════════════════════════════
   FOOTER
══════════════════════════════ */
.footer {
  text-align: center; margin-top: 1.5rem;
  font-size: 0.78rem; color: #ccc; font-weight: 800;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  animation: fadeUp 0.6s ease 2s both;
}
@keyframes fadeUp {
  0%   { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- Curtain Reveal -->
<div class="curtain-left"></div>
<div class="curtain-right"></div>
<div class="curtain-logo"><span>✦</span>Hello &amp; Ahmad!</div>

<div class="bg-layer"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="blob blob4"></div>
<div class="blob blob5"></div>

<!-- SUCCESS OVERLAY (hidden by default) -->
<div class="success-overlay" id="successOverlay" style="display:none" onclick="closeSuccessModal()">
  <div class="success-box" onclick="event.stopPropagation()">
    <div class="success-emoji-wrap">
      <div class="heart-ring"></div>
      <span class="success-emoji">🎉</span>
      <div class="orbit-ring">
        <span class="orbit-dot">⭐</span>
        <span class="orbit-dot">🍭</span>
        <span class="orbit-dot">💖</span>
      </div>
    </div>
    <div class="success-title"><span class="s1">Yay!</span> <span class="s2">It worked!</span></div>
    <div class="success-divider"></div>
    <div class="success-message">
      <span class="typed-text" id="typedText"></span><span class="typed-cursor" id="typedCursor"></span>
    </div>
    <p class="success-sub" id="successFileCount"></p>
    <button class="success-close-btn" onclick="closeSuccessModal()">Thanks!</button>
  </div>
</div>

<div class="wrapper">
  <div class="header">
    <div class="logo-badge">
      <div class="logo-circle">☁</div>
      <span class="logo-text">Hello &amp; Ahmad!</span>
    </div>
    <h1>Drop your files<br><span class="c1">right</span> <span class="c2">here!</span></h1>
    <p class="subtitle">We'll whisk them away safely ✨</p>
    <div class="dot-row">
      <div class="bdot"></div><div class="bdot"></div><div class="bdot"></div>
      <div class="bdot"></div><div class="bdot"></div>
    </div>
  </div>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple />
      <div class="cloud-wrap">
        <div class="cloud-puff1"></div>
        <div class="cloud-puff2"></div>
        <div class="cloud-base"></div>
        <div class="cloud-arrow">↑</div>
      </div>
      <p class="drop-title">Click or drag files here</p>
      <p class="drop-sub">any type · up to <strong>50 MB</strong></p>
      <div class="type-pills">
        <span class="tpill tp-a">📷 photos</span>
        <span class="tpill tp-b">📄 docs</span>
        <span class="tpill tp-c">🎬 videos</span>
        <span class="tpill tp-d">📦 zips</span>
      </div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-box sb-pink">
        <span class="stat-ico">📄</span>
        <div><div class="stat-lbl">Files</div><div class="stat-num" id="statFiles">0</div></div>
      </div>
      <div class="stat-box sb-blue">
        <span class="stat-ico">💾</span>
        <div><div class="stat-lbl">Total size</div><div class="stat-num" id="statSize">0 KB</div></div>
      </div>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="upload-btn" id="uploadBtn" disabled onclick="uploadFiles()">
      <span id="btnIcon">🚀</span>
      <span id="btnText">Send it!</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="status-msg" id="statusMsg">
      <span class="status-icon" id="statusIcon"></span>
      <div class="status-body">
        <div class="status-main" id="statusMain"></div>
        <div class="status-sub"  id="statusSub"></div>
      </div>
    </div>
  </div>

  <p class="footer">🔒 Files go straight to private secure storage</p>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKAUU_sNooxj3SrOm5-oQ3NKU_e22Ec3MVBIpu3nz6GFIxoYWE-euxumr4E8VZNr_U/exec";
  const SUCCESS_MESSAGE = "Thanks Ahmad. Aap ko pastry treat du ga hehehe ^w^";

  let selectedFiles = [];
  const dropZone    = document.getElementById("dropZone");
  const fileInput   = document.getElementById("fileInput");
  const fileList    = document.getElementById("fileList");
  const uploadBtn   = document.getElementById("uploadBtn");
  const progressWrap= document.getElementById("progressWrap");
  const progressFill= document.getElementById("progressFill");
  const statusMsg   = document.getElementById("statusMsg");
  const spinner     = document.getElementById("spinner");
  const btnText     = document.getElementById("btnText");
  const btnIcon     = document.getElementById("btnIcon");
  const statsRow    = document.getElementById("statsRow");

  /* Spawn floating sparkles */
  const sparkleChars = ["✦","✧","★","✿","♥","✪","◆","✶"];
  const sparkleColors = ["#ff6eb4","#ffd93d","#6bcbff","#c084fc","#6ee7b7","#ffb347"];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = sparkleChars[i % sparkleChars.length];
    s.style.cssText = `
      left:${Math.random()*100}%;
      font-size:${10+Math.random()*14}px;
      color:${sparkleColors[i%sparkleColors.length]};
      animation-duration:${8+Math.random()*10}s;
      animation-delay:${-Math.random()*12}s;
    `;
    document.body.appendChild(s);
  }

  /* Confetti burst */
  function launchConfetti(count = 80) {
    const colors = ["#ff6eb4","#ffd93d","#6bcbff","#c084fc","#6ee7b7","#ffb347","#ff6b6b","#fff"];
    const shapes = ["50%","2px","6px"];
    for (let i = 0; i < count; i++) {
      const p = document.createElement("div");
      p.className = "confetti-piece";
      const size = 6 + Math.random() * 10;
      p.style.cssText = `
        left:${10+Math.random()*80}%;
        top:20%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${size}px;
        height:${size}px;
        border-radius:${shapes[Math.floor(Math.random()*shapes.length)]};
        border: 1.5px solid rgba(0,0,0,0.15);
        animation-duration:${1.8+Math.random()*2.5}s;
        animation-delay:${Math.random()*0.6}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4500);
    }
  }

  /* Typing animation for success message */
  let typingInterval = null;
  function typeMessage(text, onDone) {
    const el = document.getElementById("typedText");
    const cursor = document.getElementById("typedCursor");
    el.textContent = "";
    cursor.style.display = "inline-block";
    let i = 0;
    if (typingInterval) clearInterval(typingInterval);
    typingInterval = setInterval(() => {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
      } else {
        clearInterval(typingInterval);
        setTimeout(() => {
          cursor.style.display = "none";
          if (onDone) onDone();
        }, 800);
      }
    }, 50);
  }

  /* Show success modal */
  function showSuccessModal(fileCount) {
    const overlay = document.getElementById("successOverlay");
    const countEl = document.getElementById("successFileCount");
    countEl.textContent = `${fileCount} file${fileCount!==1?"s":""} successfully uploaded! ✅`;

    overlay.style.display = "flex";
    document.getElementById("typedText").textContent = "";
    document.getElementById("typedCursor").style.display = "inline-block";

    setTimeout(() => {
      launchConfetti(100);
    }, 200);

    setTimeout(() => {
      typeMessage(SUCCESS_MESSAGE);
    }, 900);
  }

  function closeSuccessModal() {
    const overlay = document.getElementById("successOverlay");
    overlay.classList.add("hiding");
    setTimeout(() => {
      overlay.style.display = "none";
      overlay.classList.remove("hiding");
    }, 400);
  }

  fileInput.addEventListener("change", e => addFiles(e.target.files));
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("dragover"); addFiles(e.dataTransfer.files); });

  function addFiles(files) {
    [...files].forEach(f => {
      if (!selectedFiles.find(x => x.name===f.name && x.size===f.size)) selectedFiles.push(f);
    });
    renderList();
  }

  function removeFile(idx) { selectedFiles.splice(idx,1); renderList(); }

  function formatSize(b) {
    if (b<1024) return b+" B";
    if (b<1048576) return (b/1024).toFixed(1)+" KB";
    return (b/1048576).toFixed(1)+" MB";
  }

  function getIcon(f) {
    const t = f.type||"";
    if (t.startsWith("image/")) return ["fi-img","📷"];
    if (t.startsWith("video/")) return ["fi-vid","🎬"];
    if (t.includes("pdf")||t.includes("word")||t.includes("text")) return ["fi-doc","📄"];
    if (t.includes("zip")||t.includes("compressed")||t.includes("tar")) return ["fi-zip","📦"];
    return ["fi-def","📁"];
  }

  function renderList() {
    fileList.innerHTML = "";
    const total = selectedFiles.reduce((a,f)=>a+f.size,0);
    statsRow.style.display = selectedFiles.length ? "flex" : "none";
    document.getElementById("statFiles").textContent = selectedFiles.length;
    document.getElementById("statSize").textContent  = formatSize(total);

    selectedFiles.forEach((f,i) => {
      const [cls,ico] = getIcon(f);
      const d = document.createElement("div");
      d.className = "file-item";
      d.style.animationDelay = (i*0.06)+"s";
      d.innerHTML = `<div class="ficon ${cls}"><span>${ico}</span></div>
        <span class="fname">${f.name}</span>
        <span class="fsize">${formatSize(f.size)}</span>
        <button class="remove-btn" onclick="removeFile(${i})" title="Remove">✕</button>`;
      fileList.appendChild(d);
    });

    uploadBtn.disabled = !selectedFiles.length;
    statusMsg.className = "status-msg";
  }

  async function uploadFiles() {
    if (!selectedFiles.length) return;
    const count = selectedFiles.length;
    uploadBtn.disabled = true;
    spinner.style.display = "block";
    btnIcon.style.display = "none";
    btnText.textContent = "Sending...";
    progressWrap.style.display = "block";
    statusMsg.className = "status-msg";

    let uploaded=0, failed=0;
    for (let i=0; i<selectedFiles.length; i++) {
      const file = selectedFiles[i];
      progressFill.style.width = Math.round((i/selectedFiles.length)*100)+"%";
      try {
        const b64 = await toBase64(file);
        await fetch(SCRIPT_URL, {
          method:"POST", mode:"no-cors",
          body: JSON.stringify({name:file.name, mimeType:file.type||"application/octet-stream", data:b64})
        });
        uploaded++;
      } catch { failed++; }
    }

    progressFill.style.width = "100%";
    spinner.style.display = "none";
    btnIcon.style.display = "";
    btnText.textContent = "Send it!";

    if (failed===0) {
      selectedFiles=[]; renderList(); fileInput.value="";
      setTimeout(() => {
        showSuccessModal(count);
      }, 300);
    } else {
      showStatus("error","❌",
        `${uploaded} sent, ${failed} failed.`,
        "Kuch masla ho gaya! Please try again 😩"
      );
    }

    setTimeout(()=>{ progressWrap.style.display="none"; progressFill.style.width="0%"; },1500);
    uploadBtn.disabled = !selectedFiles.length;
  }

  function toBase64(file) {
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(",")[1]);
      r.onerror=rej;
      r.readAsDataURL(file);
    });
  }

  function showStatus(type, icon, main, sub) {
    document.getElementById("statusIcon").innerHTML = icon;
    document.getElementById("statusMain").innerHTML = main;
    document.getElementById("statusSub").innerHTML  = sub||"";
    statusMsg.className = "status-msg "+type;
  }
</script>
</body>
</html>
